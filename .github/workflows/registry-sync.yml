name: registry sync

on:
  workflow_dispatch:

jobs:
  sync-image:
    runs-on: ubuntu-latest

    steps:
    - name: Setup Crane
      uses: imjasonh/setup-crane@v0.7

    - name: Run Crane Copy
      timeout-minutes: 30
      run: |     
        IMAGE_NAME="ghcr.io/jellyfin/jellyfin:latest"

        crane copy --platform linux/amd64 \
          $IMAGE_NAME \
          ${{ secrets.DOCKERHUB_PATH }}/$IMAGE_NAME
