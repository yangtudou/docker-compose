name: Sync Docker Images To Aliyun

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  sync:
    name: Sync Images
    runs-on: ubuntu-latest

    env:
      PLATFORM: linux/amd64
      ALIYUN_REGISTRY_DOMAIN: ${{ secrets.ALIYUN_REGISTRY_DOMAIN }}
      ALIYUN_REGISTRY_SPACE_NAME: ${{ secrets.ALIYUN_REGISTRY_SPACE_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Crane
        uses: imjasonh/setup-crane@v0.7

      - name: Log in to Aliyun Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_DOMAIN }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Sync Images
        run: |
          chmod +x .github/scripts/sync.sh
          ./.github/scripts/sync.sh

      - name: Cleanup Old Workflow Runs
        if: always()
        run: |
          RUN_IDS=$(gh api repos/${{ github.repository }}/actions/workflows/registry-sync.yml/runs --jq '.workflow_runs[] | select(.id != ${{ github.run_id }}) | .id')
          for id in $RUN_IDS; do gh api -X DELETE repos/${{ github.repository }}/actions/runs/$id; done
        env:
          GH_TOKEN: ${{ github.token }}
