name: Sync Docker Images To Aliyun

on:
  workflow_dispatch:

jobs:
  sync-to-aliyun:
    runs-on: ubuntu-latest
    steps:
    - name: 安装高级同步工具 Crane
      uses: imjasonh/setup-crane@v0.7

    - name: 闷声发大财，秒传镜像
      run: |
        SRC_IMAGE="cloudflare/cloudflared:latest"
        
        # 1. 纯内存变量提取，绝不在日志打印
        BASE_NAME="${SRC_IMAGE##*/}"
        IMAGE_NAME="${BASE_NAME%%:*}"
        IMAGE_TAG="${BASE_NAME#*:}"
        [ "$BASE_NAME" = "$IMAGE_TAG" ] && IMAGE_TAG="latest"
        
        # 2. 一脚踹过去，crane 内部会自动脱敏 secrets 变量
        crane copy --platform linux/amd64 \
          --username "${{ secrets.ALIYUN_USERNAME }}" \
          --password "${{ secrets.ALIYUN_PASSWORD }}" \
          "$SRC_IMAGE" "${{ secrets.ALIYUN_REGISTRY_DOMAIN }}/${IMAGE_NAME}:${IMAGE_TAG}"
