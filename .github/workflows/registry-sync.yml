name: registry sync

on:
  workflow_dispatch:

jobs:
  sync-image:
    runs-on: ubuntu-latest

    steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci
        ping: ug-dxp2800pro


    - name: Setup Crane
      uses: imjasonh/setup-crane@v0.7

    - name: Run Crane Copy
      timeout-minutes: 30
      run: |
        crane version
        
        IMAGE_NAME="ghcr.io/shadowsocks/ssserver-rust:v1.24.0"

        crane copy --platform linux/amd64 \
          --jobs 1 \
          $IMAGE_NAME \
          ${{ secrets.DOCKERHUB_PATH }}/$IMAGE_NAME
