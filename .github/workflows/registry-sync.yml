name: Sync Docker Images To Aliyun

on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync Images
    runs-on: ubuntu-latest

    env:
      PLATFORM: linux/amd64
      ALIYUN_REGISTRY_DOMAIN: ${{ secrets.ALIYUN_REGISTRY_DOMAIN }}
      ALIYUN_REGISTRY_SPACE_NAME: ${{ secrets.ALIYUN_REGISTRY_SPACE_NAME }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Crane
        uses: imjasonh/setup-crane@v0.7

      - name: Login Registry
        run: |
          crane auth login "$ALIYUN_REGISTRY_DOMAIN" \
            -u "$ALIYUN_USERNAME" \
            -p "$ALIYUN_PASSWORD"

      - name: Sync Images
        run: |
          chmod +x .github/scripts/sync.sh
          ./.github/scripts/sync.sh
