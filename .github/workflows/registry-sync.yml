name: Sync Aliyun Registry

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  sync:
    name: Start Jobs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set Config
        env:
          ALIYUN_REGISTRY_SPACE_NAME: ${{ secrets.ALIYUN_REGISTRY_SPACE_NAME }}
          ALIYUN_REGISTRY_DOMAIN: ${{ secrets.ALIYUN_REGISTRY_DOMAIN }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          envsubst < auth_template.yaml > auth.yaml
          envsubst < imagesToAliyunRegistry_template.yaml > images.yaml

      - name: Sync Images
        uses: hhyasdf/image-sync-action@v1.1
        with:
          auth_file: ./auth.yaml
          images_file: ./images.yaml
          version: latest
          proc: 6
          os: linux
          arch: amd64

      - name: Cleanup Old Workflow Runs
        if: always()
        run: |
          RUN_IDS=$(gh api repos/${{ github.repository }}/actions/workflows/registry-sync.yml/runs --jq '.workflow_runs[] | select(.id != ${{ github.run_id }}) | .id')
          for id in $RUN_IDS; do gh api -X DELETE repos/${{ github.repository }}/actions/runs/$id; done
        env:
          GH_TOKEN: ${{ github.token }}
