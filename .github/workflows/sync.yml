name: registry sync

on:
  workflow_dispatch:

jobs:
  sync-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
        tags: tag:ci

    - name: Check Registry Health
      uses: jtalk/url-health-check-action@v5
      with:
        url: https://registry.local.y3-3am.top/v2/
        allowed-status-codes: 200
        timeout: 3
        max-attempts: 1

    - name: Setup Crane
      uses: imjasonh/setup-crane@v0.7

    - name: Run Crane Copy
      timeout-minutes: 10
      run: |
        crane copy --platform linux/amd64 \
          codeberg.org/forgejo/forgejo:15 \
          registry.local.y3-3am.top/codeberg.org/forgejo/forgejo:15
