name: Build Mihomo Image

on:
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./mihomo
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mihomo:latest
            ghcr.io/${{ github.repository_owner }}/mihomo:${{ github.sha }}
