name: Update README Images List

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Update README Image List
        run: |
          cat << 'EOF' > update_readme.py
          import os

          # 1. 检查 images.txt 是否存在
          if not os.path.exists('images.txt'):
              print("未找到 images.txt，跳过更新。")
              exit(0)

          # 2. 读取并严格过滤：去掉空行，删掉所有包含 '#' 的行
          images = []
          with open('images.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line or '#' in line:
                      continue
                  images.append(line)

          # 3. 拼接高颜值、极简精美 Markdown 表格
          table = "| # | 🐳 镜像名称 (Container Image) | 🏷️ 版本 (Tag) |\n"
          table += "| :-: | :--- | :-: |\n"

          for idx, img in enumerate(images, 1):
              # 兼容带端口的私有仓库（如 registry:5000/image:v1）的 tag 拆分
              if ':' in img:
                  parts = img.rsplit(':', 1)
                  if '/' in parts[1]:  # 说明冒号是端口号（如 registry:5000/image），没有 tag
                      name, tag = img, 'latest'
                  else:
                      name, tag = parts[0], parts[1]
              else:
                  name, tag = img, 'latest'
              
              # 序号使用双位数对齐（如 01, 02），整体排版极度舒适
              table += f"| **{idx:02d}** | `{name}` | `{tag}` |\n"

          # 4. 替换 README.md 中的内容
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          start_tag = '<!-- IMAGES_TABLE_START -->'
          end_tag = '<!-- IMAGES_TABLE_END -->'

          if start_tag in readme and end_tag in readme:
              before = readme.split(start_tag)[0]
              after = readme.split(end_tag)[1]
              new_readme = before + start_tag + '\n\n' + table + '\n' + end_tag + after
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_readme)
              print("README.md 极简精美表格更新成功！")
          else:
              print("未在 README.md 中找到定位标签，跳过。")
          EOF

          python3 update_readme.py
          rm update_readme.py

      - name: Commit and Push README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          if git diff --staged --quiet; then
            echo "README 没变化，跳过推送。"
          else
            git commit -m "docs: 自动更新精美镜像列表 [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
