name: Update README Images List

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Update README Image List
        run: |
          cat << 'EOF' > update_readme.py
          import os
          import urllib.parse

          # 1. 检查文件是否存在
          if not os.path.exists('images.txt'):
              print("未找到 images.txt，跳过更新。")
              exit(0)

          # 2. 读取并严格过滤（去掉空行和包含 '#' 的行）
          images = []
          with open('images.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line or '#' in line:
                      continue
                  images.append(line)

          # 3. 按 A-Z 重新排序
          images.sort()

          # 4. 构建无序号、单色徽章的双列 Markdown 表格
          table = "| 镜像名称 | 标签 |\n"
          table += "| :--- | :-: |\n"

          for img in images:
              # 拆分镜像名和 tag
              if ':' in img:
                  name, tag = img.rsplit(':', 1)
              else:
                  name, tag = img, 'latest'
              
              # 镜像名优化：去掉冗余的 docker.io/ 或 library/ 前缀
              if name.startswith('library/'):
                  name = name[len('library/'):]
              elif name.startswith('docker.io/library/'):
                  name = name[len('docker.io/library/'):]
              elif name.startswith('docker.io/'):
                  name = name[len('docker.io/'):]
              
              # Shields.io 单标签转义与编码
              safe_tag = tag.replace('-', '--').replace('_', '__')
              encoded_tag = urllib.parse.quote(safe_tag)
              
              # 智能配色
              if tag == 'latest':
                  color = '4470c4'  # 质感深蓝
              elif any(char.isdigit() for char in tag):
                  color = '3da95e'  # 极客大厂绿
              else:
                  color = '8a919f'  # 优雅高级灰
              
              # 💡 关键修复：在 {encoded_tag} 前面加上一个减号 `-`
              # 这样 Shields.io 就会把左边留空，只生成一个纯色的、只有版本号的小药丸！
              badge_url = f"https://img.shields.io/badge/-{encoded_tag}-{color}?style=flat-square"
              badge_md = f"![{tag}]({badge_url})"
              
              table += f"| {name} | {badge_md} |\n"

          # 5. 替换 README.md 中的定位标签
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          start_tag = '<!-- IMAGES_TABLE_START -->'
          end_tag = '<!-- IMAGES_TABLE_END -->'

          if start_tag in readme and end_tag in readme:
              before = readme.split(start_tag)[0]
              after = readme.split(end_tag)[1]
              new_readme = before + start_tag + '\n\n' + table + '\n' + end_tag + after
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_readme)
              print("README.md 极简徽章表格更新成功！")
          else:
              print("未在 README.md 中找到定位标签，跳过。")
          EOF

          python3 update_readme.py
          rm update_readme.py

      - name: Commit and Push README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          if git diff --staged --quiet; then
            echo "README 没变化，跳过推送。"
          else
            git commit -m "docs: 自动更新镜像列表 [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
