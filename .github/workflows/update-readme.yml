name: Update README Images List

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Update README Image List
        run: |
          cat << 'EOF' > update_readme.py
          import os
          import urllib.parse

          # 1. 检查文件是否存在
          if not os.path.exists('images.txt'):
              print("未找到 images.txt，跳过更新。")
              exit(0)

          # 2. 读取并严格过滤（去掉空行和包含 '#' 的行）
          images = []
          with open('images.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line or '#' in line:
                      continue
                  images.append(line)

          # 3. 按 A-Z 重新排序
          images.sort()

          def escape_shields(text):
              # Shields.io 规则：- 转义为 --，_ 转义为 __，然后进行 URL 编码
              escaped = text.replace('_', '__').replace('-', '--')
              return urllib.parse.quote(escaped)

          # 4. 构建流式徽章墙
          badge_list = []
          for img in images:
              if ':' in img:
                  name, tag = img.rsplit(':', 1)
              else:
                  name, tag = img, 'latest'
              
              # 镜像名优化：去掉冗余的前缀
              if name.startswith('library/'):
                  name = name[len('library/'):]
              elif name.startswith('docker.io/library/'):
                  name = name[len('docker.io/library/'):]
              elif name.startswith('docker.io/'):
                  name = name[len('docker.io/'):]
              
              escaped_name = escape_shields(name)
              escaped_tag = escape_shields(tag)
              
              # 智能配色
              if tag == 'latest':
                  color = 'blue'
              elif any(char.isdigit() for char in tag):
                  color = 'green'
              else:
                  color = 'orange'
              
              # 生成拼接徽章
              badge_url = f"https://img.shields.io/badge/{escaped_name}-{escaped_tag}-{color}?style=flat"
              badge_list.append(f"![{img}]({badge_url})")

          # 💡 核心改动：用空格拼接所有徽章，直接平铺，彻底干掉 markdown 列表的圆点
          content = " ".join(badge_list)

          # 5. 替换 README.md 中的定位标签
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          start_tag = '<!-- IMAGES_LIST_START -->' if '<!-- IMAGES_LIST_START -->' in readme else '<!-- IMAGES_TABLE_START -->'
          end_tag = '<!-- IMAGES_LIST_END -->' if '<!-- IMAGES_LIST_END -->' in readme else '<!-- IMAGES_TABLE_END -->'

          if start_tag in readme and end_tag in readme:
              before = readme.split(start_tag)[0]
              after = readme.split(end_tag)[1]
              new_readme = before + start_tag + '\n\n' + content + '\n\n' + end_tag + after
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_readme)
              print("README.md 流式徽章墙已成功更新！")
          else:
              print("未在 README.md 中找到定位标签，跳过。")
          EOF

          python3 update_readme.py
          rm update_readme.py

      - name: Commit and Push README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          if git diff --staged --quiet; then
            echo "README 没变化，跳过推送。"
          else
            git commit -m "docs: 自动更新并平铺镜像徽章 [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
