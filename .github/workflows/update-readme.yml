name: Update README Images List

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Update README Image List
        run: |
          cat << 'EOF' > update_readme.py
          import os

          # 1. 检查文件是否存在
          if not os.path.exists('images.txt'):
              print("未找到 images.txt，跳过更新。")
              exit(0)

          # 2. 读取并过滤（去掉空行和包含 '#' 的行）
          images = []
          with open('images.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line or '#' in line:
                      continue
                  images.append(line)

          # 3. 按 A-Z 重新排序
          images.sort()

          # 4. 构建高级感 HTML 原生表格（锁定比例与字号分层）
          table = "<table>\n"
          table += "  <thead>\n"
          table += "    <tr>\n"
          table += "      <th width=\"10%\" align=\"center\">#</th>\n"
          table += "      <th width=\"65%\" align=\"left\">Container Image</th>\n"
          table += "      <th width=\"25%\" align=\"center\">Tag</th>\n"
          table += "    </tr>\n"
          table += "  </thead>\n"
          table += "  <tbody>\n"

          for idx, img in enumerate(images, 1):
              # 极简拆分逻辑
              if ':' in img:
                  name, tag = img.rsplit(':', 1)
              else:
                  name, tag = img, 'latest'
              
              # 视觉分层：将命名空间置灰缩小，项目名加粗
              if '/' in name:
                  ns, repo = name.split('/', 1)
                  display_name = f"<sub>{ns}</sub> / <strong>{repo}</strong>"
              else:
                  display_name = f"<strong>{name}</strong>"

              table += "    <tr>\n"
              table += f"      <td align=\"center\"><code>{idx:02d}</code></td>\n"
              table += f"      <td>{display_name}</td>\n"
              table += f"      <td align=\"center\"><code>{tag}</code></td>\n"
              table += "    </tr>\n"
          
          table += "  </tbody>\n"
          table += "</table>"

          # 5. 替换 README.md 中的定位标签
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          start_tag = '<!-- IMAGES_TABLE_START -->'
          end_tag = '<!-- IMAGES_TABLE_END -->'

          if start_tag in readme and end_tag in readme:
              before = readme.split(start_tag)[0]
              after = readme.split(end_tag)[1]
              new_readme = before + start_tag + '\n\n' + table + '\n\n' + end_tag + after
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_readme)
              print("README.md 高级感表格已成功更新！")
          else:
              print("未在 README.md 中找到定位标签，跳过。")
          EOF

          python3 update_readme.py
          rm update_readme.py

      - name: Commit and Push README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          if git diff --staged --quiet; then
            echo "README 没变化，跳过推送。"
          else
            git commit -m "docs: 自动更新并重排镜像列表 [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
