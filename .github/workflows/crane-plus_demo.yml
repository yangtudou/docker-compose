name: crane-plus action demo

on:
  workflow_dispatch:

jobs:
  sync:
    name: crane-plus action demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Log in to Aliyun Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_DOMAIN }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Sync Images with crane-plus
        uses: yangtudou/crane-plus@v1-test
        with:
          src: alpine:latest
          dst: ${{ secrets.ALIYUN_REGISTRY_DOMAIN }}/${{ secrets.ALIYUN_REGISTRY_SPACE_NAME }}
          platform: linux/amd64
          max_concurrent: '4'
