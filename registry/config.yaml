version: 0.1

log:
  level: info

storage:
  filesystem:
    rootdirectory: /var/lib/registry
  delete:
    enabled: true

http:
  addr: :5000

  headers:
    Access-Control-Allow-Origin:
      - "*"

    Access-Control-Allow-Methods:
      - HEAD
      - GET
      - OPTIONS
      - DELETE

    Access-Control-Allow-Headers:
      - Authorization
      - Accept
      - Cache-Control

    Access-Control-Expose-Headers:
      - Docker-Content-Digest

    Access-Control-Allow-Credentials:
      - "true"

health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3